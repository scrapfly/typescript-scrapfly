name: Publish to NPM + JSR

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*' # Runs when a version tag is pushed, e.g. v0.10.3

permissions:
  id-token: write
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Install Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      # Produces ./npm (dnt-generated Node package).
      - name: Build npm package
        run: deno task build-npm

      # Produces ./build (staged JSR payload: src + deno.json, no tests).
      - name: Stage JSR package
        run: ./stage-jsr.sh

      - name: Upload npm artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-package
          path: npm/
          retention-days: 1

      - name: Upload jsr artifact
        uses: actions/upload-artifact@v4
        with:
          name: jsr-package
          path: build/
          retention-days: 1

  npm:
    name: Publish to NPM
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Download npm artifact
        uses: actions/download-artifact@v4
        with:
          name: npm-package
          path: npm

      - name: Publish
        run: npm publish
        working-directory: ./npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_AUTOMATION_TOKEN }}

  jsr:
    name: Publish to JSR
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Install Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: Download jsr artifact
        uses: actions/download-artifact@v4
        with:
          name: jsr-package
          path: build

      # OIDC authenticates via the workflow-level id-token: write. Once the
      # JSR package is linked to this repo, no token secret is required.
      - name: Publish
        run: deno publish --allow-dirty
        working-directory: ./build
